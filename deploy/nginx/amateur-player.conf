server {
    listen 80;
    server_name base.bowlersnetwork.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name base.bowlersnetwork.com;

    # SSL (Let's Encrypt — certbot will fill these)
    ssl_certificate /etc/letsencrypt/live/base.bowlersnetwork.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/base.bowlersnetwork.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Next.js amateur-player on port 4001
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:4001;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
