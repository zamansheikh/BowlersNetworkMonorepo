name: Deploy Amateur Player

on:
  push:
    branches: [main]
    paths:
      - "apps/amateur-player/**"
      - "packages/**"
      - ".env"
      - "pnpm-lock.yaml"
  workflow_dispatch: # manual trigger button in GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/BowlersNetworkMonorepo

            # Pull latest code
            git pull origin main

            # Install dependencies
            pnpm install --frozen-lockfile

            # Build amateur-player
            pnpm --filter @bowlersnetwork/amateur-player build

            # Restart the app via PM2
            pm2 restart amateur-player --update-env || pm2 start ecosystem.config.cjs --only amateur-player
