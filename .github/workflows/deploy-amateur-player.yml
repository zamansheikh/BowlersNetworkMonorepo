name: Deploy Amateur Player

on:
  push:
    branches: [main]
    paths:
      - "apps/amateur-player/**"
      - "packages/**"
      - ".env"
      - "pnpm-lock.yaml"
  workflow_dispatch: # manual trigger button in GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Extra step Start: Ensure Node.js 20 is installed and used
            set -e

            # Ensure Node.js 20 is available (nvm)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
            # Extra step end

            cd /var/www/BowlersNetworkMonorepo

            # Pull latest code
            git pull origin main

            # Install dependencies
            pnpm install --frozen-lockfile

            # Build amateur-player (set -e ensures deploy stops here if build fails)
            pnpm --filter @bowlersnetwork/amateur-player build

            # Stop & delete the old PM2 process, then start fresh from ecosystem config
            pm2 delete amateur-player 2>/dev/null || true
            pm2 start ecosystem.config.cjs --only amateur-player
            pm2 save
